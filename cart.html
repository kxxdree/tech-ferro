<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТехФерро - Корзина</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/cart/index.css" />
    <link rel="stylesheet" href="components/footer/footer.css" />
    <script src="/js/footer.js" defer></script>
  </head>
  <body>
    <header class="header">
      <div class="header__container">
        <a href="/catalog.html">
          <img class="back-icon" src="/assets/icons/chevron-right.svg" alt="Назад" />
          <span>Вернуться к покупкам</span>
        </a>
        <div class="header__logo">
          <img src="/assets/icons/logo-colored.svg" alt="Логотип" />
        </div>
        <p>+7 (952) 500-50-50</p>
      </div>
    </header>

    <main class="main">
      <section class="cart__container">
        <header class="cart__container--header">
          <h1>Корзина</h1>
          <span>2 товара</span>
        </header>
        <div class="cart__content">
          <ul class="cart__list">
            <li class="cart__list-item">
              <img class="cart__list-item--photo" src="/assets/images/catalog/item-photo.png" alt="Фото товара" />
              <div class="cart__list-item--details">
                <div class="details--title-container">
                  <h3>Барбекю</h3>
                  <h2>Барбекю</h2>
                </div>
                <div class="details--price-container">
                  <div class="price-row">
                    <p>0 000 ₽</p>
                    <span>0 000 ₽</span>
                  </div>
                  <div class="cart-quantitiy">
                    <button>
                      <img src="/assets/icons/minus-icon.svg" alt="Убрать товар" />
                    </button>
                    <span class="card-quantitiy--number">2</span>
                    <button>
                      <img src="/assets/icons/plus-icon.svg" alt="Добавить товар" />
                    </button>
                  </div>
                  <button class="details--delete-btn">Удалить</button>
                </div>
              </div>
            </li>
            <li class="cart__list-item">
              <img class="cart__list-item--photo" src="/assets/images/catalog/item-photo-2.png" alt="Фото товара" />
              <div class="cart__list-item--details">
                <div class="details--title-container">
                  <h3>Стол-гриль</h3>
                  <h2>Восьмигранный V2</h2>
                </div>
                <div class="details--price-container">
                  <div class="price-row">
                    <p>0 000 ₽</p>
                    <span>0 000 ₽</span>
                  </div>
                  <div class="cart-quantitiy">
                    <button>
                      <img src="/assets/icons/minus-icon.svg" alt="Убрать товар" />
                    </button>
                    <span class="card-quantitiy--number">2</span>
                    <button>
                      <img src="/assets/icons/plus-icon.svg" alt="Добавить товар" />
                    </button>
                  </div>
                  <button class="details--delete-btn">Удалить</button>
                </div>
              </div>
            </li>
          </ul>
        </div>
      </section>
    </main>

    <!-- Футер  -->
    <!-- <div id="footer-placeholder"></div> -->
  </body>
</html>
