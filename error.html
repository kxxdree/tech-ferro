<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Техферро — Страница не найдена</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/error.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__container">
        <div class="header__logo">
          <img src="/assets/icons/logo-colored.svg" alt="Логотип" />
        </div>
        <nav class="header__nav">
          <ul class="header__menu">
            <li><a href="#">Главная</a></li>
            <li><a href="#">Каталог</a></li>
            <li><a href="#">О нас</a></li>
            <li><a href="#">Контакты</a></li>
            <li><a href="#">+7 (952) 500-50-50</a></li>
          </ul>
        </nav>
        <div class="header__buttons">
          <div class="header__buttons-wrapper">
            <img class="header__cart" src="assets/icons/search.svg" alt="Поиск" />
          </div>
          <div class="header__buttons-wrapper">
            <img class="header__search" src="assets/icons/cart.svg" alt="Корзина" />
          </div>
          <div class="header__buttons-wrapper">
            <img class="header__burger" src="assets/icons/burger.svg" alt="Меню" />
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <section class="error-section container">
        <div class="error-section__text-container">
          <p class="error-404">404</p>
          <div class="error-section__title-container">
            <h2 class="error-title">Страница не найдена</h2>
            <p class="error-subtitle">К сожалению, неправильно набран адрес, или такой страницы на сайте больше не существует</p>
            <button class="error-button">
              <a href="/"> На главную </a>
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
