<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Техферро — Страница не найдена</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/error/index.css" />
    <link rel="stylesheet" href="components/header/header.css" />
    <link rel="stylesheet" href="components/footer/footer.css" />
    <script src="js/header.js" defer></script>
    <script src="js/footer.js" defer></script>
  </head>
  <body>
    <!-- Шапка  -->

    <div id="header-placeholder" data-active-page="error"></div>

    <!-- Мейн  -->

    <main class="main">
      <section class="error">
        <div class="error__container">
          <h1 class="error__code">404</h1>
          <div class="error__content">
            <h2 class="error__title">Страница не найдена</h2>
            <p class="error__message">К сожалению, неправильно набран адрес, или такой страницы на сайте больше не существует</p>
            <a href="/" class="error__button">На главную</a>
          </div>
        </div>
      </section>
    </main>

    <!-- Футер  -->
    <div id="footer-placeholder"></div>
  </body>
</html>
