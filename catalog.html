<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТехФерро - Каталог</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/catalog/index.css" />
    <link rel="stylesheet" href="components/footer/footer.css" />
    <script src="js/footer.js" defer></script>
  </head>
  <body>
    <!-- Шапка  -->
    <header class="header">
      <div class="header__container">
        <div class="header__logo">
          <img src="/assets/icons/logo-colored.svg" alt="Логотип" />
        </div>

        <nav class="header__nav">
          <ul class="header__menu">
            <li class="header__menu-item">
              <a href="/">Главная</a>
            </li>
            <li class="header__menu-item active-link">
              <a href="/catalog.html">Каталог</a>
            </li>
            <li class="header__menu-item">
              <a href="/about.html">О нас</a>
            </li>
            <li class="header__menu-item">
              <a href="/contacts.html">Контакты</a>
            </li>
            <li class="header__menu-item">
              <a href="tel:+79525005050">+7 (952) 500-50-50</a>
            </li>
          </ul>
        </nav>

        <div class="header__buttons">
          <button class="header__icon-btn" id="search-button" aria-label="Поиск">
            <img src="assets/icons/search.svg" alt="Поиск" />
          </button>
          <button class="header__icon-btn header__cart-btn" aria-label="Корзина">
            <img src="assets/icons/cart.svg" alt="Корзина" />
            <span class="header__cart-count">0</span>
          </button>
          <button class="header__icon-btn header__burger-btn" aria-label="Меню">
            <img class="header__burger" src="assets/icons/burger.svg" alt="Меню" />
          </button>
        </div>
      </div>
    </header>

    <!-- Мейн -->

    <main class="main">
      <header class="catalog__header">
        <nav class="catalog__header-nav">
          <a class="main-link" href="/">Главная</a>
          <span>/</span>
          <span class="catalog-link">Каталог</span>
        </nav>
      </header>
      <section class="catalog__container">
        <h2>Каталог</h2>
        <ul class="catalog__list">
          <li data-title="Мангалы и барбекю">
            <a href="/catalog/barbecues.html">
              <img src="assets/images/catalog/catalog-image-1.png" alt="Категория" />
            </a>
          </li>
          <li data-title="Комплексы и печи">
            <a href="/catalog/cookers.html">
              <img src="assets/images/catalog/catalog-image-3.png" alt="Категория" />
            </a>
          </li>
          <li data-title="Костровые чаши">
            <a href="/">
              <img src="assets/images/catalog/catalog-image-4.png" alt="Категория" />
            </a>
          </li>
          <li data-title="Для участка">
            <a href="/">
              <img src="assets/images/catalog/catalog-image-2.png" alt="Категория" />
            </a>
          </li>
          <li data-title="Ворота и заборы">
            <a href="/">
              <img src="assets/images/catalog/catalog-image-2.png" alt="Категория" />
            </a>
          </li>
        </ul>
      </section>
    </main>

    <!-- Футер  -->
    <div id="footer-placeholder"></div>
  </body>
</html>
